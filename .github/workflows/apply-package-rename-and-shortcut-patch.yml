name: Apply package rename and shortcut patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-package-rename-and-shortcut-patch.yml
      - patches/2026-04-13-package-rename-and-shortcut-fix.patch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apply patch
        shell: bash
        run: |
          if git apply --check patches/2026-04-13-package-rename-and-shortcut-fix.patch; then
            git apply patches/2026-04-13-package-rename-and-shortcut-fix.patch
          else
            echo "Patch already applied or source changed"
          fi

      - name: Commit and push if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nb4a.properties \
                  app/src/main/res/xml/shortcuts.xml \
                  app/src/main/java/io/nekohasekai/sagernet/ui/MainActivity.kt
          git commit -m "Apply package rename and shortcut fix"
          git push
