name: Apply Neko fixes on main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-neko-fixes-main.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apply source changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          
          def read(path: str) -> str:
              return Path(path).read_text(encoding='utf-8')
          
          def write(path: str, text: str):
              Path(path).write_text(text, encoding='utf-8')
          
          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f'Failed to find block for {label}')
              return text.replace(old, new, 1)
          
          def remove_once(text: str, old: str) -> str:
              return text.replace(old, '', 1) if old in text else text
          
          # 1) Restore settings toggles
          path = 'app/src/main/java/io/nekohasekai/sagernet/ui/SettingsPreferenceFragment.kt'
          text = read(path)
          text = replace_once(
              text,
              '        val allowAccess = findPreference<Preference>(Key.ALLOW_ACCESS)!!\n',
              '        val allowAccess = findPreference<SwitchPreference>(Key.ALLOW_ACCESS)!!\n',
              'allowAccess preference type'
          )
          forced_disable = '''        // Force-disable insecure local proxy exposure options.\n        if (DataStore.allowAccess) DataStore.allowAccess = false\n        if (DataStore.appendHttpProxy) DataStore.appendHttpProxy = false\n        allowAccess.isEnabled = false\n        appendHttpProxy.apply {\n            isChecked = false\n            isEnabled = false\n        }\n\n'''
          text = remove_once(text, forced_disable)
          write(path, text)
          
          # 2) Remove hard-disable from DataStore
          path = 'app/src/main/java/io/nekohasekai/sagernet/database/DataStore.kt'
          text = read(path)
          hardening = '''        // Security hardening: keep local inbound proxies unavailable from LAN/VPN HTTP append.\n        allowAccess = false\n        appendHttpProxy = false\n'''
          text = remove_once(text, hardening)
          write(path, text)
          
          # 3) Gate mixed inbound creation to actual need
          path = 'app/src/main/java/io/nekohasekai/sagernet/fmt/ConfigBuilder.kt'
          text = read(path)
          text = replace_once(
              text,
              '    val bind = if (!forTest && DataStore.allowAccess) "0.0.0.0" else LOCALHOST\n',
              '    val bind = if (!forTest && DataStore.allowAccess) "0.0.0.0" else LOCALHOST\n    val needMixedInbound = !isVPN || DataStore.allowAccess || DataStore.appendHttpProxy\n',
              'needMixedInbound declaration'
          )
          old_mixed = '''            inbounds.add(Inbound_MixedOptions().apply {\n                type = "mixed"\n                tag = TAG_MIXED\n                listen = bind\n                listen_port = DataStore.mixedPort\n                domain_strategy = genDomainStrategy(DataStore.resolveDestination)\n                sniff = needSniff\n                sniff_override_destination = needSniffOverride\n            })\n'''
          new_mixed = '''            if (needMixedInbound) inbounds.add(Inbound_MixedOptions().apply {\n                type = "mixed"\n                tag = TAG_MIXED\n                listen = bind\n                listen_port = DataStore.mixedPort\n                domain_strategy = genDomainStrategy(DataStore.resolveDestination)\n                sniff = needSniff\n                sniff_override_destination = needSniffOverride\n            })\n'''
          text = replace_once(text, old_mixed, new_mixed, 'mixed inbound block')
          old_global_mixed = '''            route.rules.add(Rule_DefaultOptions().apply {\n                inbound = listOf(TAG_MIXED)\n                outbound = mainProxyTag\n            })\n'''
          new_global_mixed = '''            if (needMixedInbound) {\n                route.rules.add(Rule_DefaultOptions().apply {\n                    inbound = listOf(TAG_MIXED)\n                    outbound = mainProxyTag\n                })\n            }\n'''
          text = replace_once(text, old_global_mixed, new_global_mixed, 'global mode mixed rule')
          write(path, text)
          
          # 4) Disable Android backup for sensitive data
          path = 'app/src/main/AndroidManifest.xml'
          text = read(path)
          text = replace_once(
              text,
              '        android:allowBackup="true"\n',
              '        android:allowBackup="false"\n',
              'allowBackup'
          )
          write(path, text)
          
          # 5) Add label for desktop shortcut
          path = 'app/src/main/res/values/strings.xml'
          text = read(path)
          label_line = '    <string name="quick_clear_cache_restart">Clear Cache &amp; Restart</string>\n'
          if label_line not in text:
              anchor = '    <string name="quick_disable">Disable</string>\n'
              if anchor not in text:
                  raise SystemExit('Failed to find anchor for quick_clear_cache_restart')
              text = text.replace(anchor, anchor + label_line, 1)
          write(path, text)
          
          # 6) Fix static shortcut package and route cache-clear shortcut via MainActivity
          path = 'app/src/main/res/xml/shortcuts.xml'
          text = read(path)
          text = text.replace('android:targetPackage="moe.nb4a"', 'android:targetPackage="com.nb4a"')
          clear_cache_shortcut = '''    <shortcut\n        android:icon="@drawable/ic_qu_shadowsocks_launcher"\n        android:shortcutId="clear-cache-restart"\n        android:shortcutLongLabel="@string/quick_clear_cache_restart"\n        android:shortcutShortLabel="@string/quick_clear_cache_restart">\n        <intent\n            android:action="com.nb4a.action.CLEAR_CACHE_AND_RESTART"\n            android:targetClass="io.nekohasekai.sagernet.ui.MainActivity"\n            android:targetPackage="com.nb4a" />\n    </shortcut>\n'''
          if 'android:shortcutId="clear-cache-restart"' not in text:
              anchor = '''    <shortcut\n        android:icon="@drawable/ic_qu_camera_launcher"'''
              if anchor not in text:
                  raise SystemExit('Failed to find anchor for clear-cache shortcut')
              text = text.replace(anchor, clear_cache_shortcut + anchor, 1)
          write(path, text)
          
          # 7) Handle cache-clear shortcut inside MainActivity to avoid launcher resolution issues
          path = 'app/src/main/java/io/nekohasekai/sagernet/ui/MainActivity.kt'
          text = read(path)
          if 'import android.widget.Toast\n' not in text:
              text = text.replace('import android.view.MenuItem\n', 'import android.view.MenuItem\nimport android.widget.Toast\n', 1)
          if 'import com.jakewharton.processphoenix.ProcessPhoenix\n' not in text:
              text = text.replace('import com.google.android.material.snackbar.Snackbar\n', 'import com.google.android.material.snackbar.Snackbar\nimport com.jakewharton.processphoenix.ProcessPhoenix\n', 1)
          if 'import java.io.File\n' not in text:
              text = text.replace('import moe.matsuri.nb4a.utils.Util\n', 'import moe.matsuri.nb4a.utils.Util\nimport java.io.File\n', 1)
          
          companion = '''    companion object {\n        const val ACTION_CLEAR_CACHE_AND_RESTART = "com.nb4a.action.CLEAR_CACHE_AND_RESTART"\n    }\n\n'''
          if 'ACTION_CLEAR_CACHE_AND_RESTART' not in text:
              anchor = '    lateinit var navigation: NavigationView\n\n'
              if anchor not in text:
                  raise SystemExit('Failed to find anchor for MainActivity companion object')
              text = text.replace(anchor, anchor + companion, 1)
          
          old_oncreate_intent = '''        if (intent?.action == Intent.ACTION_VIEW) {\n            onNewIntent(intent)\n        }\n'''
          new_oncreate_intent = '''        intent?.let {\n            if (!handleSpecialIntent(it) && it.action == Intent.ACTION_VIEW) {\n                onNewIntent(it)\n            }\n        }\n'''
          text = replace_once(text, old_oncreate_intent, new_oncreate_intent, 'MainActivity onCreate intent handling')
          
          old_onnewintent = '''    override fun onNewIntent(intent: Intent) {\n        super.onNewIntent(intent)\n\n        val uri = intent.data ?: return\n\n        runOnDefaultDispatcher {\n            if (uri.scheme == "sn" && uri.host == "subscription" || uri.scheme == "clash") {\n                importSubscription(uri)\n            } else {\n                importProfile(uri)\n            }\n        }\n    }\n'''
          new_onnewintent = '''    override fun onNewIntent(intent: Intent) {\n        super.onNewIntent(intent)\n        setIntent(intent)\n\n        if (handleSpecialIntent(intent)) return\n\n        val uri = intent.data ?: return\n\n        runOnDefaultDispatcher {\n            if (uri.scheme == "sn" && uri.host == "subscription" || uri.scheme == "clash") {\n                importSubscription(uri)\n            } else {\n                importProfile(uri)\n            }\n        }\n    }\n'''
          text = replace_once(text, old_onnewintent, new_onnewintent, 'MainActivity onNewIntent handling')
          
          helper_block = '''    private fun handleSpecialIntent(intent: Intent): Boolean {\n        if (intent.action != ACTION_CLEAR_CACHE_AND_RESTART) return false\n\n        clearAppCacheAndRestart()\n        return true\n    }\n\n    private fun clearAppCacheAndRestart() {\n        runOnDefaultDispatcher {\n            try {\n                SagerNet.stopService()\n                Thread.sleep(300)\n\n                clearDirFiles(SagerNet.application.cacheDir, skipFiles = setOf("neko.log"))\n\n                val parentDir = SagerNet.application.cacheDir.parentFile\n                val relativeCache = parentDir?.let { File(it, "cache") }\n                if (relativeCache != null && relativeCache.exists() && relativeCache.isDirectory) {\n                    clearDirFiles(relativeCache)\n                }\n\n                onMainDispatcher {\n                    Toast.makeText(\n                        this@MainActivity,\n                        R.string.clear_cache_success,\n                        Toast.LENGTH_SHORT\n                    ).show()\n                    ProcessPhoenix.triggerRebirth(this@MainActivity)\n                }\n            } catch (e: Exception) {\n                onMainDispatcher {\n                    Toast.makeText(\n                        this@MainActivity,\n                        getString(R.string.clear_cache_failed, e.message),\n                        Toast.LENGTH_SHORT\n                    ).show()\n                }\n            }\n        }\n    }\n\n    private fun clearDirFiles(dir: File, skipFiles: Set<String> = emptySet()): Boolean {\n        if (!dir.isDirectory) return false\n\n        val children = dir.list() ?: return true\n        for (child in children) {\n            val childFile = File(dir, child)\n\n            if (child == "neko.log") {\n                try {\n                    childFile.writeText("")\n                    continue\n                } catch (_: Exception) {\n                }\n            }\n\n            if (child in skipFiles) continue\n\n            if (childFile.isDirectory) {\n                clearDirFiles(childFile, skipFiles)\n            } else {\n                childFile.delete()\n            }\n        }\n\n        return true\n    }\n\n'''
          if 'private fun handleSpecialIntent(intent: Intent): Boolean' not in text:
              anchor = '    fun urlTest(): Int {\n'
              if anchor not in text:
                  raise SystemExit('Failed to find anchor for MainActivity shortcut helpers')
              text = text.replace(anchor, helper_block + anchor, 1)
          write(path, text)
          PY

      - name: Commit and push if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/io/nekohasekai/sagernet/ui/SettingsPreferenceFragment.kt \
            app/src/main/java/io/nekohasekai/sagernet/database/DataStore.kt \
            app/src/main/java/io/nekohasekai/sagernet/fmt/ConfigBuilder.kt \
            app/src/main/AndroidManifest.xml \
            app/src/main/res/values/strings.xml \
            app/src/main/res/xml/shortcuts.xml \
            app/src/main/java/io/nekohasekai/sagernet/ui/MainActivity.kt
          git commit -m "Apply Neko fixes via GitHub Actions"
          git push
