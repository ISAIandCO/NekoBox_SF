name: Fix clear-cache shortcut v3

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Rewrite shortcut-related files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          ACTION = "com.isaiandco.neko.action.CLEAR_CACHE_AND_RESTART"
          PACKAGE = "com.isaiandco.neko"

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          # MainActivity: align the action constant with the shortcut action.
          path = "app/src/main/java/io/nekohasekai/sagernet/ui/MainActivity.kt"
          text = read(path)
          text = text.replace(
              'const val ACTION_CLEAR_CACHE_AND_RESTART = "com.nb4a.action.CLEAR_CACHE_AND_RESTART"',
              f'const val ACTION_CLEAR_CACHE_AND_RESTART = "{ACTION}"'
          )
          write(path, text)

          # AndroidManifest: add a dedicated intent-filter for the explicit shortcut action.
          path = "app/src/main/AndroidManifest.xml"
          text = read(path)
          marker = '            <meta-data\n                android:name="android.app.shortcuts"\n                android:resource="@xml/shortcuts" />\n        </activity>'
          intent_filter = (
              '            <intent-filter>\n'
              f'                <action android:name="{ACTION}" />\n'
              '                <category android:name="android.intent.category.DEFAULT" />\n'
              '            </intent-filter>\n\n'
              '            <meta-data\n'
              '                android:name="android.app.shortcuts"\n'
              '                android:resource="@xml/shortcuts" />\n'
              '        </activity>'
          )
          if ACTION not in text:
              text = text.replace(marker, intent_filter)
          write(path, text)

          # shortcuts.xml: publish a new shortcut ID so launchers do not keep using the old pinned copy.
          path = "app/src/main/res/xml/shortcuts.xml"
          text = read(path)
          text = text.replace('android:shortcutId="clear-cache-restart"', 'android:shortcutId="clear-cache-restart-v3"')
          text = text.replace('android:action="com.isaiandco.neko.action.CLEAR_CACHE_AND_RESTART"', f'android:action="{ACTION}"')
          text = text.replace('android:targetPackage="com.isaiandco.neko"', f'android:targetPackage="{PACKAGE}"')
          write(path, text)
          PY

      - name: Show diff
        run: git diff -- app/src/main/java/io/nekohasekai/sagernet/ui/MainActivity.kt app/src/main/AndroidManifest.xml app/src/main/res/xml/shortcuts.xml

      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/io/nekohasekai/sagernet/ui/MainActivity.kt app/src/main/AndroidManifest.xml app/src/main/res/xml/shortcuts.xml
          git commit -m "Fix clear-cache shortcut action and republish shortcut ID"
          git push
